<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data AC Kanwil Ditjenim Sumsel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- STYLE UTAMA -->
    <link rel="stylesheet" href="style.css">

    <style>
        .page-title {
            margin-bottom: 20px;
        }

        .excel-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        /* WRAPPER SCROLL */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
        }

        .excel-table {
            width: 100%;
            min-width: 1000px;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }

        .excel-table thead {
            background: #1b4f8a;
            color: white;
        }

        .excel-table th,
        .excel-table td {
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            text-align: left;
            white-space: nowrap;
        }

        .excel-table tbody tr:nth-child(even) {
            background: #f9fbff;
        }

        .excel-table tbody tr:hover {
            background: #eef4ff;
        }

        .badge-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: white;
            display: inline-block;
        }

        .aman { background: #2e7d32; }
        .segera { background: #f9a825; }
        .terlambat { background: #c62828; }

        .sheet-btn {
            margin-top: 10px;
            display: inline-block;
            text-decoration: none;
            padding: 10px 16px;
            background: #1b4f8a;
            color: white;
            border-radius: 8px;
            font-weight: 600;
        }

        .sheet-btn:hover {
            background: #163f6f;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<header class="navbar">
    <div class="brand">
        <div class="logo">
            <img src="imigrasi.jpg" alt="Logo Imigrasi">
        </div>
        <div class="title">
            <h1>RT Kantor Wilayah Sumatera Selatan</h1>
            <span>Scheduler</span>
        </div>
    </div>

    <div class="btn-container">
        <a href="index.html" class="btn btn-primary"><img src="homeicon.png" width="21px" height="auto"></a>
    </div>
</header>

<!-- MAIN -->
<main class="container">
    <div class="page-title">
        <h2>📊 Data AC Kanwil Ditjen Imigrasi Sumatera Selatan</h2>

        <!-- BUTTON SPREADSHEET -->
        <a class="sheet-btn"
           href="https://docs.google.com/spreadsheets/d/1HXPk5NmqGugayjeGUvDU0b3Um0pN90TRqKDUS7I-Lq4/edit?gid=0#gid=0"
           target="_blank">
           ✏️ Buka & Ubah Data Spreadsheet
        </a>
    </div>

    <div class="excel-card">
        <div class="table-wrapper">
            <table class="excel-table" id="excelTable">
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>


<script>
const sheetURL =
  "https://docs.google.com/spreadsheets/d/1HXPk5NmqGugayjeGUvDU0b3Um0pN90TRqKDUS7I-Lq4/export?format=csv&gid=0";

Papa.parse(sheetURL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
        if (!results.data || results.data.length === 0) {
            console.error("Data kosong");
            return;
        }
        renderTable(results.data);
    },
    error: function(err) {
        console.error("Gagal load CSV:", err);
    }
});

function renderTable(data) {
    const thead = document.querySelector("#excelTable thead");
    const tbody = document.querySelector("#excelTable tbody");

    thead.innerHTML = `
        <tr>
            ${Object.keys(data[0]).map(h => `<th>${h}</th>`).join("")}
        </tr>
    `;

    tbody.innerHTML = "";
    data.forEach(row => {
        tbody.innerHTML += `
            <tr>
                ${Object.values(row).map(v => `<td>${v ?? ""}</td>`).join("")}
            </tr>
        `;
    });
}
</script>

</body>
</html>
